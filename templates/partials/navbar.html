{% load static %}
<header class="sticky top-0 z-40 bg-white/95 backdrop-blur-sm border-b border-gray-200 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a href="{% url 'core:home' %}" class="flex items-center gap-2 shrink-0">
        <span class="text-lg font-black text-brand-800 tracking-tight leading-none">WHOLECAKE</span>
        <span class="text-xs font-semibold text-gray-400 tracking-widest uppercase leading-none mt-0.5">GROUP</span>
      </a>

      <!-- Desktop navigation -->
      <nav class="hidden md:flex items-center gap-1">
        <a href="{% url 'core:home' %}"
           class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-brand-700 hover:bg-brand-50 rounded-lg transition-colors">
          Home
        </a>
        <a href="{% url 'wellness:index' %}"
           class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-brand-700 hover:bg-brand-50 rounded-lg transition-colors">
          Wellness Division
        </a>
        <a href="{% url 'core:about' %}"
           class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-brand-700 hover:bg-brand-50 rounded-lg transition-colors">
          About
        </a>
        <a href="{% url 'core:home' %}#contact"
           class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-brand-700 hover:bg-brand-50 rounded-lg transition-colors">
          Contact
        </a>
      </nav>

      <!-- Desktop CTA -->
      <div class="hidden md:flex items-center gap-3">
        <a href="{% url 'wellness:index' %}#consultation"
           class="btn-primary text-sm py-2.5 px-5">
          Request A Consultation
        </a>
      </div>

      <!-- Mobile menu button -->
      <button id="mobile-menu-btn" type="button" aria-label="Open navigation"
              class="md:hidden p-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">
        <svg id="icon-open" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
        </svg>
        <svg id="icon-close" class="w-6 h-6 hidden" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div id="mobile-menu" class="hidden md:hidden border-t border-gray-100 bg-white px-4 pb-4">
    <nav class="flex flex-col gap-1 pt-3">
      <a href="{% url 'core:home' %}"
         class="px-4 py-3 text-sm font-medium text-gray-700 hover:text-brand-700 hover:bg-brand-50 rounded-lg transition-colors">
        Home
      </a>
      <a href="{% url 'wellness:index' %}"
         class="px-4 py-3 text-sm font-medium text-gray-700 hover:text-brand-700 hover:bg-brand-50 rounded-lg transition-colors">
        Wellness Division
      </a>
      <a href="{% url 'core:about' %}"
         class="px-4 py-3 text-sm font-medium text-gray-700 hover:text-brand-700 hover:bg-brand-50 rounded-lg transition-colors">
        About
      </a>
      <a href="{% url 'core:home' %}#contact"
         class="px-4 py-3 text-sm font-medium text-gray-700 hover:text-brand-700 hover:bg-brand-50 rounded-lg transition-colors">
        Contact
      </a>
      <div class="pt-3 border-t border-gray-100 mt-2">
        <a href="{% url 'wellness:index' %}#consultation"
           class="btn-primary w-full text-sm justify-center">
          Request A Consultation
        </a>
      </div>
    </nav>
  </div>
</header>

<script>
  (function () {
    var btn = document.getElementById('mobile-menu-btn');
    var menu = document.getElementById('mobile-menu');
    var iconOpen = document.getElementById('icon-open');
    var iconClose = document.getElementById('icon-close');
    btn.addEventListener('click', function () {
      var isOpen = !menu.classList.contains('hidden');
      menu.classList.toggle('hidden', isOpen);
      iconOpen.classList.toggle('hidden', !isOpen);
      iconClose.classList.toggle('hidden', isOpen);
      btn.setAttribute('aria-label', isOpen ? 'Open navigation' : 'Close navigation');
    });
  })();
</script>
