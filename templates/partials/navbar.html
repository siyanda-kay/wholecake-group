{% load static %}
<!-- Tailwind safeguard (JS-toggled classes):
     bg-transparent border-transparent
     bg-white/95 backdrop-blur-md border-gray-200 shadow-sm
     text-white/85 text-gray-600 text-white/80 border-white/30 border-gray-300
-->
<style>
  @media (min-width: 980px) {
    .desktop-nav {
      display: flex !important;
    }

    .desktop-actions {
      display: flex !important;
    }

    .tablet-menu-btn {
      display: none !important;
    }
  }
</style>
<header id="site-nav"
        class="fixed top-0 left-0 right-0 h-[68px] z-200 flex items-center border-b border-transparent transition-[background-color,border-color,box-shadow,backdrop-filter] duration-300">

  <div class="max-w-300 mx-auto px-8 w-full flex items-center justify-between">

    <!-- Logo -->
    <a href="{% url 'core:home' %}" class="flex items-center shrink-0 -ml-3 mt-2.5">
      <img id="nav-logo-light"
           src="https://ik.imagekit.io/ek7drjowu/ChatGPT%20Image%20Jun%209,%202026,%2008_31_03%20PM.png?updatedAt=1781032683416"
           alt="Wholecake Group"
           class="h-18 w-auto hidden">
      <img id="nav-logo-dark"
           src="https://ik.imagekit.io/ek7drjowu/logo%20dark.png?updatedAt=1781034801191"
           alt="Wholecake Group"
           class="h-17 w-auto">
    </a>

    <!-- Desktop nav links -->
    <nav id="nav-links" class="desktop-nav hidden items-center gap-1">
      <a href="{% url 'core:home' %}#about"   class="nav-lnk text-sm font-medium px-3.5 py-[7px] rounded-lg text-gray-600 transition-all duration-150 hover:bg-black/5">About</a>
      <a href="{% url 'wellness:index' %}"     class="nav-lnk text-sm font-medium px-3.5 py-[7px] rounded-lg text-gray-600 transition-all duration-150 hover:bg-black/5">Women’s Wellness Program</a>
      <a href="{% url 'core:about' %}"         class="nav-lnk text-sm font-medium px-3.5 py-[7px] rounded-lg text-gray-600 transition-all duration-150 hover:bg-black/5">About Us</a>
      <a href="{% url 'core:home' %}#contact"  class="nav-lnk text-sm font-medium px-3.5 py-[7px] rounded-lg text-gray-600 transition-all duration-150 hover:bg-black/5">Contact</a>
    </nav>

    <!-- Desktop CTAs -->
    <div id="nav-actions" class="desktop-actions hidden items-center gap-2.5">
      <a href="{% url 'core:home' %}#contact" id="nav-ghost"
         class="text-sm font-medium px-4 py-2 rounded-full border border-gray-300 text-gray-600 no-underline transition-all duration-150 hover:bg-gray-100 hover:text-gray-900">
        Get In Touch
      </a>
      <a href="{% url 'wellness:index' %}#consultation"
         class="btn-primary text-sm py-[9px] px-[18px] whitespace-nowrap rounded-full">
        Request Consultation ›
      </a>
    </div>

    <!-- Mobile burger -->
    <button id="mobile-menu-btn" type="button" aria-label="Open navigation"
            class="tablet-menu-btn p-2 rounded-lg bg-transparent border-none cursor-pointer text-gray-700">
      <svg id="icon-open" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
      </svg>
      <svg id="icon-close" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor" class="hidden">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>

  </div>

  <!-- Mobile menu -->
  <div id="mobile-menu"
       class="hidden absolute top-[68px] left-0 right-0 bg-[#0a0f1e]/95 backdrop-blur-md border-t border-white/10 shadow-[0_12px_28px_rgba(0,0,0,0.28)] p-4">
    <nav class="flex flex-col gap-0.5">
      <a href="{% url 'core:home' %}#about"  class="text-[15px] font-medium text-white/85 px-4 py-3 rounded-lg hover:bg-white/6">About</a>
      <a href="{% url 'wellness:index' %}"    class="text-[15px] font-medium text-white/85 px-4 py-3 rounded-lg hover:bg-white/6">Women’s Wellness Program</a>
      <a href="{% url 'core:about' %}"        class="text-[15px] font-medium text-white/85 px-4 py-3 rounded-lg hover:bg-white/6">About Us</a>
      <a href="{% url 'core:home' %}#contact" class="text-[15px] font-medium text-white/85 px-4 py-3 rounded-lg hover:bg-white/6">Contact</a>
      <div class="pt-3 border-t border-white/10 mt-2">
        <a href="{% url 'wellness:index' %}#consultation"
           class="inline-flex items-center justify-center gap-2 text-center text-[15px] font-semibold text-white bg-brand-700 py-[9px] px-[18px] rounded-full hover:bg-brand-800 no-underline">
          Request A Consultation
        </a>
      </div>
    </nav>
  </div>

</header>

<script>
(function(){
  var nav   = document.getElementById('site-nav');
  var ll    = document.getElementById('nav-logo-light');
  var ld    = document.getElementById('nav-logo-dark');
  var links = document.querySelectorAll('.nav-lnk');
  var ghost = document.getElementById('nav-ghost');
  var dark  = document.body.classList.contains('page-dark-hero');

  var SOLID_NAV   = ['bg-white/95','backdrop-blur-md','border-gray-200','shadow-sm'];
  var CLEAR_NAV   = ['bg-transparent','border-transparent'];

  function apply(scrolled) {
    if (scrolled || !dark) {
      SOLID_NAV.forEach(function(c){ nav.classList.add(c); });
      CLEAR_NAV.forEach(function(c){ nav.classList.remove(c); });
      ll.classList.add('hidden'); ld.classList.remove('hidden');
      links.forEach(function(a){ a.classList.remove('text-white/85'); a.classList.add('text-gray-600'); });
      if (ghost) { ghost.classList.remove('text-white/80','border-white/30'); ghost.classList.add('text-gray-600','border-gray-300'); }
    } else {
      CLEAR_NAV.forEach(function(c){ nav.classList.add(c); });
      SOLID_NAV.forEach(function(c){ nav.classList.remove(c); });
      ll.classList.remove('hidden'); ld.classList.add('hidden');
      links.forEach(function(a){ a.classList.add('text-white/85'); a.classList.remove('text-gray-600'); });
      if (ghost) { ghost.classList.add('text-white/80','border-white/30'); ghost.classList.remove('text-gray-600','border-gray-300'); }
    }
  }

  window.addEventListener('scroll', function(){ apply(window.scrollY > 60); }, {passive: true});
  apply(window.scrollY > 60);

  /* Mobile toggle */
  var btn   = document.getElementById('mobile-menu-btn');
  var menu  = document.getElementById('mobile-menu');
  var iOpen = document.getElementById('icon-open');
  var iClos = document.getElementById('icon-close');
  if (btn) {
    btn.addEventListener('click', function() {
      menu.classList.toggle('hidden');
      iOpen.classList.toggle('hidden');
      iClos.classList.toggle('hidden');
    });
  }
})();
</script>
